<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root { color-scheme: light dark; }
      html, body { height: 100%; }
      body {
        margin: 0;
        padding: 12px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: 8px;
        font: 13px/1.4 system-ui, sans-serif;
      }
      header { display: flex; align-items: center; gap: 8px; }
      header img { width: 24px; height: 24px; }
      header h1 { font-size: 15px; margin: 0; }
      .row { display: flex; gap: 6px; }
      button {
        flex: 1;
        padding: 7px 10px;
        border: 1px solid color-mix(in srgb, currentColor 25%, transparent);
        border-radius: 6px;
        background: transparent;
        color: inherit;
        cursor: pointer;
        font: inherit;
      }
      button:hover { background: color-mix(in srgb, currentColor 8%, transparent); }
      .exports button { font-size: 12px; padding: 5px 6px; }
      details summary { font-size: 11px; opacity: 0.6; cursor: pointer; }
      #status { font-size: 12px; opacity: 0.7; }
      #status.warn { color: #d93025; opacity: 1; }
      #preview {
        flex: 1;
        min-height: 120px;
        overflow-y: auto;
        border: 1px solid color-mix(in srgb, currentColor 15%, transparent);
        border-radius: 6px;
        padding: 6px 8px;
        font-size: 12px;
      }
      #preview:empty::before { content: 'No lines yet'; opacity: 0.4; }
      .line { margin-bottom: 5px; }
      .line .spk { font-weight: 600; }
      .line .ts { opacity: 0.5; font-size: 11px; }
    </style>
  </head>
  <body>
    <header>
      <img src="../assets/Speaky-128.png" alt="" />
      <h1>Speaky</h1>
    </header>
    <div class="row">
      <button id="start">Start</button>
      <button id="stop">Stop</button>
    </div>
    <div class="row exports">
      <button id="export-json">JSON</button>
      <button id="export-txt">TXT</button>
      <button id="export-md">MD</button>
      <button id="reset">Reset</button>
    </div>
    <details>
      <summary>Experimental: audio STT (no captions)</summary>
      <div class="row" style="margin-top: 6px;">
        <button id="audio-start">Start Audio</button>
        <button id="audio-stop">Stop Audio</button>
      </div>
    </details>
    <div id="status">Idle</div>
    <div id="preview"></div>
    <script src="sidepanel.js"></script>
  </body>
</html>
