<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root { color-scheme: light dark; }
      body {
        width: 300px;
        margin: 0;
        padding: 14px;
        font: 13px/1.4 system-ui, sans-serif;
      }
      h1 { font-size: 14px; margin: 0 0 10px; }
      .row { display: flex; gap: 6px; margin-bottom: 8px; }
      button {
        flex: 1;
        padding: 7px 10px;
        border: 1px solid color-mix(in srgb, currentColor 25%, transparent);
        border-radius: 6px;
        background: transparent;
        color: inherit;
        cursor: pointer;
        font: inherit;
      }
      button:hover { background: color-mix(in srgb, currentColor 8%, transparent); }
      button:disabled { opacity: 0.4; cursor: default; }
      .exports button { font-size: 12px; padding: 5px 6px; }
      #status { font-size: 12px; opacity: 0.7; margin: 6px 0; }
      #status.warn { color: #d93025; opacity: 1; }
      #preview {
        height: 150px;
        overflow-y: auto;
        border: 1px solid color-mix(in srgb, currentColor 15%, transparent);
        border-radius: 6px;
        padding: 6px 8px;
        font-size: 12px;
      }
      #preview:empty::before {
        content: 'No lines yet';
        opacity: 0.4;
      }
      .line { margin-bottom: 4px; }
      .line .spk { font-weight: 600; }
      .line .ts { opacity: 0.5; font-size: 11px; }
    </style>
  </head>
  <body>
    <h1>Meet Transcriber</h1>
    <div class="row">
      <button id="start">Start</button>
      <button id="stop">Stop</button>
    </div>
    <div class="row exports">
      <button id="export-json">JSON</button>
      <button id="export-txt">TXT</button>
      <button id="export-md">MD</button>
      <button id="reset">Reset</button>
    </div>
    <details>
      <summary style="font-size: 11px; opacity: 0.6; cursor: pointer; margin-bottom: 6px;">
        Experimental: audio STT (no captions)
      </summary>
      <div class="row">
        <button id="audio-start">Start Audio</button>
        <button id="audio-stop">Stop Audio</button>
      </div>
    </details>
    <div id="status">Idle</div>
    <div id="preview"></div>
    <script src="popup.js"></script>
  </body>
</html>
